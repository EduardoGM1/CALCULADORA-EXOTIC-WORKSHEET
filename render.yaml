# Blueprint de Render: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: calculadora-exotic-worksheet
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
